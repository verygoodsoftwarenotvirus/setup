# Starship prompt config (requires Nerd Font for icons)
"$schema" = "https://starship.rs/config-schema.json"

add_newline = true

format = """
[╭─](bold cyan)$username$hostname$directory$git_branch$git_status$time
[╰─](bold cyan)$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"

[git_branch]
symbol = ""
style = "bold purple"

[git_status]
style = "bold yellow"
conflicted = "\\[conflicts\\]"
ahead = "\\[ahead ${count}\\]"
behind = "\\[behind ${count}\\]"
diverged = "\\[diverged +${ahead_count} -${behind_count}\\]"
untracked = "\\[untracked\\]"
stashed = "\\[stashed\\]"
modified = "\\[modified\\]"
staged = "\\[staged\\]"
renamed = "\\[renamed\\]"
deleted = "\\[deleted\\]"

[username]
style_user = "bold dimmed cyan"
style_root = "bold red"
format = "[$user]($style)@"
show_always = false

[hostname]
ssh_only = true
style = "bold dimmed cyan"
format = "[$hostname]($style) "

[time]
disabled = false
format = "[\\($time\\)]($style) "
style = "bold dimmed cyan"
time_format = "%H:%M"
